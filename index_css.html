<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Home</title>
    <style>
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulseGlow {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        50% {
          transform: scale(1.03);
          box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
        }
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #222;
      }
      .card {
        background: white;
        padding: 2rem 2.5rem;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        text-align: center;
        animation: fadeInUp 0.8s ease-out both;
      }
      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.75rem 1.25rem;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: background 0.2s ease, transform 0.2s ease;
        animation: pulseGlow 2s infinite ease-in-out;
      }
      a:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome</h1>
      <p>Open your subfolder here:</p>
      <a href="web5/">Go to web5</a>
    </div>
  </body>
</html>
