{% extends "base.html" %}
{% block title %}Register - Blog{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Create an account</h1>
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="{{ username|default('') }}" required
                   minlength="3" maxlength="20" placeholder="Pick a username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="6+ characters">
        </div>
        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" required placeholder="Type it again">
        </div>
        <button type="submit" class="btn">Register</button>
    </form>
    <p class="form-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
