<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Home</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f8e9f4 0%, #f5f7fb 100%);
        color: #222;
      }
      .card {
        background: #ffffff;
        padding: 2.2rem 2.6rem;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
        border: 1px solid #e5e7eb;
      }
      h1 {
        color: #6d28d9;
        margin-bottom: 0.6rem;
      }
      p {
        color: #4b5563;
        font-weight: 500;
      }
      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.85rem 1.2rem;
        background: linear-gradient(90deg, #8b5cf6, #3b82f6);
        color: white;
        text-decoration: none;
        border-radius: 999px;
        font-weight: bold;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 6px 16px rgba(59, 130, 246, 0.2);
      }
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(59, 130, 246, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome</h1>
      <p>Open your subfolder here:</p>
      <a href="web5/">Go to web5</a>
    </div>
    <script>
      const title = document.querySelector('h1');
      const message = document.querySelector('p');
      const link = document.querySelector('a');

      const greetings = ['Welcome', 'Hello there', 'Let\'s explore'];
      const messages = [
        'Open your subfolder here:',
        'Your project space is ready:',
        'Click below to continue:'
      ];

      let index = 0;

      setInterval(() => {
        index = (index + 1) % greetings.length;
        title.textContent = greetings[index];
        message.textContent = messages[index];
        link.textContent = index === 0 ? 'Go to web5' : 'Open now';
      }, 3000);
    </script>
  </body>
</html>
