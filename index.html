<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Home</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #ff7aa2 0%, #ffb347 45%, #7dd3fc 100%);
        color: #222;
      }
      .card {
        background: rgba(255, 255, 255, 0.95);
        padding: 2rem 2.5rem;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
        border: 2px solid #ffffff;
      }
      h1 {
        color: #7c3aed;
        margin-bottom: 0.5rem;
      }
      p {
        color: #374151;
      }
      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.8rem 1.2rem;
        background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
        color: white;
        text-decoration: none;
        border-radius: 999px;
        font-weight: bold;
        transition: transform 0.2s ease;
      }
      a:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome</h1>
      <p>Open your subfolder here:</p>
      <a href="web5/">Go to web5</a>
    </div>
  </body>
</html>
